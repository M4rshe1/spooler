services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "${SPOOLER_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/data/spooler.db
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
    volumes:
      - ../files/data:/data
